apiVersion: agent-workflow/v1alpha1
kind: BindingProfile
metadata:
  name: feature-delivery-example
  version: 0.1.0
spec:
  bindings:
    planner:
      runner: shell
      mode: local
    implementer:
      runner: shell
      mode: local
    tester:
      runner: shell
      mode: local
    reviewer:
      runner: mock
      mode: read-only
    summarizer:
      runner: mock
      mode: read-only
    arbiter:
      runner: mock
      mode: decision-only
