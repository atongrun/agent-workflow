apiVersion: agent-workflow/v1alpha1
kind: BindingProfile
metadata:
  name: local-example
  version: 0.1.0
  description: Local-only binding using shell runner and mock adapter.
spec:
  bindings:
    planner:
      runner: shell
      mode: local
      capabilities:
        - read-files
        - write-artifacts
      limits:
        maxTokens: 4096
        timeoutSeconds: 300
    implementer:
      runner: shell
      mode: local
      capabilities:
        - modify-files
        - execute-commands
      limits:
        maxTokens: 8192
        timeoutSeconds: 600
    tester:
      runner: shell
      mode: local
      capabilities:
        - execute-tests
      limits:
        maxTokens: 4096
        timeoutSeconds: 300
    reviewer:
      runner: mock
      mode: read-only
      capabilities:
        - read-artifacts
      limits:
        maxTokens: 4096
        timeoutSeconds: 300
    summarizer:
      runner: mock
      mode: read-only
      capabilities:
        - read-artifacts
      limits:
        maxTokens: 4096
        timeoutSeconds: 300
    arbiter:
      runner: mock
      mode: decision-only
      capabilities:
        - read-decision-packet
      limits:
        maxTokens: 2048
        timeoutSeconds: 120
