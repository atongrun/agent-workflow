apiVersion: agent-workflow/v1alpha1
kind: Workflow
metadata:
  name: documentation
  version: 0.1.0
  description: Documentation creation and review workflow.
spec:
  description: >
    Creates or updates documentation through plan → implement → review → decide.
    No dedicated test stage; review covers correctness and clarity. Reviewer onFailure means
    deterministic REQUEST_CHANGES only; BLOCKED escalates to Architect/Decider.
  inputs:
    - name: doc-request
      required: true
    - name: context
      required: false
  stages:
    - id: plan
      role: planner
      outputs:
        - TaskCard
      onSuccess: implement
      onFailure: failed
    - id: implement
      role: implementer
      inputs:
        - TaskCard
      outputs:
        - ImplementationReport
      onSuccess: review
      onFailure: failed
    - id: review
      role: reviewer
      inputs:
        - TaskCard
        - ImplementationReport
      outputs:
        - ReviewReport
      onSuccess: decide
      # Deterministic REQUEST_CHANGES only; BLOCKED escalates outside the normal rework path.
      onFailure: implement
    - id: decide
      role: arbiter
      inputs:
        - ReviewReport
      outputs:
        - Decision
      onSuccess: completed
      onFailure: failed
  terminalStates:
    - completed
    - rejected
    - cancelled
    - failed
