apiVersion: agent-workflow/v1alpha1
kind: Workflow
metadata:
  name: bugfix
  version: 0.1.0
  description: Bug fix workflow with root cause analysis and verification.
spec:
  description: >
    Fixes a reported bug through triage → plan → implement → test → review → decide.
    Includes a triage stage for root cause analysis before planning. Reviewer onFailure means
    deterministic REQUEST_CHANGES only; BLOCKED escalates to Architect/Decider.
  inputs:
    - name: bug-report
      required: true
    - name: context
      required: false
  stages:
    - id: triage
      role: planner
      outputs:
        - TaskCard
      onSuccess: plan
      onFailure: failed
    - id: plan
      role: planner
      inputs:
        - TaskCard
      outputs:
        - TaskCard
      onSuccess: implement
      onFailure: failed
    - id: implement
      role: implementer
      inputs:
        - TaskCard
      outputs:
        - ImplementationReport
      onSuccess: test
      onFailure: failed
    - id: test
      role: tester
      inputs:
        - TaskCard
        - ImplementationReport
      outputs:
        - TestReport
      onSuccess: review
      onFailure: implement
    - id: review
      role: reviewer
      inputs:
        - TaskCard
        - ImplementationReport
        - TestReport
      outputs:
        - ReviewReport
      onSuccess: decide
      # Deterministic REQUEST_CHANGES only; BLOCKED escalates outside the normal rework path.
      onFailure: implement
    - id: decide
      role: arbiter
      inputs:
        - ReviewReport
      outputs:
        - Decision
      onSuccess: completed
      onFailure: failed
  terminalStates:
    - completed
    - rejected
    - cancelled
    - failed
