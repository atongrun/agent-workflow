apiVersion: agent-workflow/v1alpha1
kind: Workflow
metadata:
  name: feature-delivery
  version: 0.1.0
  description: Standard feature delivery workflow from planning to decision.
spec:
  description: >
    Delivers a feature or change through plan → implement → test → review → summarize → decide.
    Supports rework loops: test failures and review change requests flow back to implement.
  inputs:
    - name: task
      required: true
    - name: context
      required: false
  stages:
    - id: plan
      role: planner
      outputs:
        - TaskCard
      onSuccess: implement
      onFailure: failed
    - id: implement
      role: implementer
      inputs:
        - TaskCard
      outputs:
        - ImplementationReport
      onSuccess: test
      onFailure: failed
    - id: test
      role: tester
      inputs:
        - TaskCard
        - ImplementationReport
      outputs:
        - TestReport
      onSuccess: review
      onFailure: implement
    - id: review
      role: reviewer
      inputs:
        - TaskCard
        - ImplementationReport
        - TestReport
      outputs:
        - ReviewReport
      onSuccess: summarize
      onFailure: implement
    - id: summarize
      role: summarizer
      inputs:
        - TaskCard
        - ImplementationReport
        - TestReport
        - ReviewReport
      outputs:
        - DecisionPacket
      onSuccess: decide
      onFailure: failed
    - id: decide
      role: arbiter
      inputs:
        - DecisionPacket
      outputs:
        - Decision
      onSuccess: completed
      onFailure: failed
  terminalStates:
    - completed
    - rejected
    - cancelled
    - failed
